<svg xmlns="http://www.w3.org/2000/svg" width="495" height="170" viewBox="0 0 495 170">
  <style>
    .header { font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: #70a5fd; }
    .lang-name { font: 400 11px 'Segoe UI', Ubuntu, Sans-Serif; fill: #38bdae; }
    .lang-pct { font: 600 11px 'Segoe UI', Ubuntu, Sans-Serif; fill: #38bdae; }
  </style>
  <rect x="0.5" y="0.5" rx="4.5" width="494" height="169" fill="#1a1b27" stroke="#444" stroke-opacity="1"/>

  <text x="25" y="35" class="header">Most Used Languages</text>

  <!-- Progress bar background -->
  <rect x="25" y="55" width="445" height="8" rx="4" fill="#333"/>

  <!-- C: 92.83% = 413.1 -->
  <rect x="25" y="55" width="413" height="8" rx="4" fill="#555555"/>
  <!-- C++: 4.84% = 21.5 -->
  <rect x="438" y="55" width="21" height="8" fill="#f34b7d"/>
  <!-- Assembly: 1.55% = 6.9 -->
  <rect x="459" y="55" width="7" height="8" fill="#6E4C13"/>
  <!-- Python: 0.10% + others fill the rest -->
  <rect x="466" y="55" width="4" height="8" rx="0 4 4 0" fill="#3572A5"/>

  <!-- Legend row 1 -->
  <g transform="translate(25, 85)">
    <circle cx="6" cy="6" r="6" fill="#555555"/>
    <text x="18" y="10" class="lang-name">C</text>
    <text x="32" y="10" class="lang-pct">92.83%</text>
  </g>

  <g transform="translate(120, 85)">
    <circle cx="6" cy="6" r="6" fill="#f34b7d"/>
    <text x="18" y="10" class="lang-name">C++</text>
    <text x="38" y="10" class="lang-pct">4.84%</text>
  </g>

  <g transform="translate(225, 85)">
    <circle cx="6" cy="6" r="6" fill="#6E4C13"/>
    <text x="18" y="10" class="lang-name">Assembly</text>
    <text x="72" y="10" class="lang-pct">1.55%</text>
  </g>

  <g transform="translate(355, 85)">
    <circle cx="6" cy="6" r="6" fill="#427819"/>
    <text x="18" y="10" class="lang-name">Makefile</text>
    <text x="70" y="10" class="lang-pct">0.23%</text>
  </g>

  <!-- Legend row 2 -->
  <g transform="translate(25, 115)">
    <circle cx="6" cy="6" r="6" fill="#3572A5"/>
    <text x="18" y="10" class="lang-name">Python</text>
    <text x="56" y="10" class="lang-pct">0.10%</text>
  </g>

  <g transform="translate(120, 115)">
    <circle cx="6" cy="6" r="6" fill="#b2b7f8"/>
    <text x="18" y="10" class="lang-name">Verilog</text>
    <text x="60" y="10" class="lang-pct">0.02%</text>
  </g>

  <g transform="translate(225, 115)">
    <circle cx="6" cy="6" r="6" fill="#da291c"/>
    <text x="18" y="10" class="lang-name">PostScript</text>
    <text x="76" y="10" class="lang-pct">0.22%</text>
  </g>

  <g transform="translate(355, 115)">
    <circle cx="6" cy="6" r="6" fill="#0298c3"/>
    <text x="18" y="10" class="lang-name">Perl</text>
    <text x="40" y="10" class="lang-pct">0.04%</text>
  </g>

  <!-- Snapshot date -->
  <text x="25" y="155" class="lang-name" opacity="0.5">Snapshot: May 19, 2026 (includes private repos, excludes TeX)</text>
</svg>
