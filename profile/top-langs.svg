<svg xmlns="http://www.w3.org/2000/svg" width="495" height="170" viewBox="0 0 495 170">
  <style>
    .header { font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: #70a5fd; }
    .lang-name { font: 400 11px 'Segoe UI', Ubuntu, Sans-Serif; fill: #38bdae; }
    .lang-pct { font: 600 11px 'Segoe UI', Ubuntu, Sans-Serif; fill: #38bdae; }
  </style>
  <rect x="0.5" y="0.5" rx="4.5" width="494" height="169" fill="#1a1b27" stroke="#444" stroke-opacity="1"/>

  <text x="25" y="35" class="header">Most Used Languages</text>

  <!-- Progress bar: total width 445px -->
  <rect x="25" y="55" width="445" height="8" rx="4" fill="#333"/>

  <!-- C: 54.91% = 244.3px -->
  <rect x="25" y="55" width="244" height="8" rx="4 0 0 4" fill="#555555"/>
  <!-- TypeScript: 8.49% = 37.8px -->
  <rect x="270" y="55" width="38" height="8" fill="#3178c6"/>
  <!-- Python: 6.67% = 29.7px -->
  <rect x="309" y="55" width="30" height="8" fill="#3572A5"/>
  <!-- C++: 5.45% = 24.3px -->
  <rect x="340" y="55" width="24" height="8" fill="#f34b7d"/>
  <!-- Rust: 3.19% = 14.2px -->
  <rect x="365" y="55" width="14" height="8" fill="#dea584"/>
  <!-- Kotlin: 3.04% = 13.5px -->
  <rect x="380" y="55" width="14" height="8" fill="#A97BFF"/>
  <!-- Shell: 3.00% = 13.4px -->
  <rect x="395" y="55" width="13" height="8" fill="#89e051"/>
  <!-- OCaml: 2.65% = 11.8px -->
  <rect x="409" y="55" width="12" height="8" fill="#3be133"/>
  <!-- Go: 1.71% = 7.6px -->
  <rect x="422" y="55" width="8" height="8" fill="#00ADD8"/>
  <!-- Assembly: 1.57% = 7.0px -->
  <rect x="431" y="55" width="7" height="8" fill="#6E4C13"/>
  <!-- Other: ~9.3% = remaining -->
  <rect x="439" y="55" width="31" height="8" rx="0 4 4 0" fill="#666"/>

  <!-- Legend row 1 -->
  <g transform="translate(25, 85)">
    <circle cx="6" cy="6" r="6" fill="#555555"/>
    <text x="18" y="10" class="lang-name">C <tspan class="lang-pct">54.91%</tspan></text>
  </g>

  <g transform="translate(115, 85)">
    <circle cx="6" cy="6" r="6" fill="#3178c6"/>
    <text x="18" y="10" class="lang-name">TypeScript <tspan class="lang-pct">8.49%</tspan></text>
  </g>

  <g transform="translate(240, 85)">
    <circle cx="6" cy="6" r="6" fill="#3572A5"/>
    <text x="18" y="10" class="lang-name">Python <tspan class="lang-pct">6.67%</tspan></text>
  </g>

  <g transform="translate(355, 85)">
    <circle cx="6" cy="6" r="6" fill="#f34b7d"/>
    <text x="18" y="10" class="lang-name">C++ <tspan class="lang-pct">5.45%</tspan></text>
  </g>

  <!-- Legend row 2 -->
  <g transform="translate(25, 110)">
    <circle cx="6" cy="6" r="6" fill="#dea584"/>
    <text x="18" y="10" class="lang-name">Rust <tspan class="lang-pct">3.19%</tspan></text>
  </g>

  <g transform="translate(115, 110)">
    <circle cx="6" cy="6" r="6" fill="#A97BFF"/>
    <text x="18" y="10" class="lang-name">Kotlin <tspan class="lang-pct">3.04%</tspan></text>
  </g>

  <g transform="translate(240, 110)">
    <circle cx="6" cy="6" r="6" fill="#89e051"/>
    <text x="18" y="10" class="lang-name">Shell <tspan class="lang-pct">3.00%</tspan></text>
  </g>

  <g transform="translate(355, 110)">
    <circle cx="6" cy="6" r="6" fill="#3be133"/>
    <text x="18" y="10" class="lang-name">OCaml <tspan class="lang-pct">2.65%</tspan></text>
  </g>

  <!-- Legend row 3 -->
  <g transform="translate(25, 135)">
    <circle cx="6" cy="6" r="6" fill="#00ADD8"/>
    <text x="18" y="10" class="lang-name">Go <tspan class="lang-pct">1.71%</tspan></text>
  </g>

  <g transform="translate(115, 135)">
    <circle cx="6" cy="6" r="6" fill="#6E4C13"/>
    <text x="18" y="10" class="lang-name">Assembly <tspan class="lang-pct">1.57%</tspan></text>
  </g>

  <g transform="translate(240, 135)">
    <circle cx="6" cy="6" r="6" fill="#b2b7f8"/>
    <text x="18" y="10" class="lang-name">Verilog <tspan class="lang-pct">1.31%</tspan></text>
  </g>

  <g transform="translate(355, 135)">
